# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
# Settings related to reviews:
reviews:
  high_level_summary_instructions: |
    Write a concise, reviewer-friendly PR summary.

    Format:
    - open with 1-2 sentences stating the purpose and net effect of the PR
    - follow with a flat bullet list (no sub-headings, no nested sections)
    - aim for 5-8 bullets; more are acceptable for large PRs but keep each bullet to one sentence
    - group closely related changes into a single bullet rather than listing them separately

    Content rules:
    - focus on what changed and why, not how it was implemented
    - skip trivial cleanup, test adjustments, and config file additions unless they affect correctness
    - do not include a "Why it matters" or motivation section — the opening sentences already cover this
    - flag breaking changes inline (e.g., "**Breaking:** ...") instead of giving them a separate section
    - wrap all code symbols (classes, protocols, methods, properties, types) in backticks (e.g., `BaseSubscription`, `dispose()`)

  # Automatically approve once CodeRabbit's comments are resolved and no pre-merge checks are failing. Defaults to false
  # request_changes_workflow: true
  
  # Include the high-level summary in the walkthrough comment. Defaults to false
  high_level_summary_in_walkthrough: true
  # Generate a poem in the walkthrough comment. Defaults to true
  poem: false
  # Include an estimated code review effort in the walkthrough. Defaults to true
  estimate_code_review_effort: false
  # Include sequence diagrams in the walkthrough. Defaults to true
  sequence_diagrams: false
  # Include a summary of the changed files in the walkthrough. Defaults to true
  changed_files_summary: false
  # Configuration for auto review. Defaults to {}
  auto_review:
    # Include draft PRs. Defaults to false
    drafts: true
  # Configuration for finishing touches. Defaults to {}
  finishing_touches:
    # Configure docstring generation
    docstrings:
      enabled: true
    unit_tests:
      # Generate unit tests for changes in PRs. Defaults to true
      enabled: false
  # Tools that provide additional context to code reviews. Defaults to {}
  tools:
    # LanguageTool is a style and grammar checker for 30+ languages. Defaults to {}
    languagetool:
      enabled: true
    # SwiftLint integration configuration object. Defaults to {}
    swiftlint:
      enabled: true
